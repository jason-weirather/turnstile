service_id: mock-image-generator
capabilities:
  - image.generate
mode: warm
image: python:3.12-slim
gpu_required: true
estimated_vram_mb: 4096
startup_timeout_s: 30
idle_ttl_s: 300
healthcheck:
  type: http
  path: /healthz
  expected_status: 200
  timeout_s: 2
adapter_type: http_forward_json
adapter_config:
  container_port: 8000
  path: /generate
  method: POST
  timeout_s: 30
  cancel_path: /cancel
  command:
    - python
    - -c
    - |
      import json
      from http.server import BaseHTTPRequestHandler, HTTPServer

      class Handler(BaseHTTPRequestHandler):
          def _send(self, status, payload):
              body = json.dumps(payload).encode()
              self.send_response(status)
              self.send_header("Content-Type", "application/json")
              self.send_header("Content-Length", str(len(body)))
              self.end_headers()
              self.wfile.write(body)

          def do_GET(self):
              if self.path == "/healthz":
                  self._send(200, {"status": "ok"})
                  return
              self._send(404, {"error": "not_found"})

          def do_POST(self):
              length = int(self.headers.get("Content-Length", "0"))
              payload = json.loads(self.rfile.read(length) or b"{}")
              if self.path == "/cancel":
                  self._send(202, {"job_id": payload.get("job_id"), "status": "cancelling"})
                  return
              if self.path == "/generate":
                  prompt = payload.get("prompt", "untitled").replace(" ", "-")
                  self._send(
                      200,
                      {
                          "image_url": f"memory://artifacts/{prompt}.png",
                          "style": payload.get("style", "default"),
                          "backend": "warm-http",
                      },
                  )
                  return
              self._send(404, {"error": "not_found"})

      HTTPServer(("0.0.0.0", 8000), Handler).serve_forever()
cancel_strategy: http_request_cancel
eviction_priority: 10
