service_id: mock-gpu-http-alpha
capabilities:
  - example.http.gpu-echo
mode: warm
image: turnstile/mock-http-tool:latest
gpu_required: true
estimated_vram_mb: 512
startup_timeout_s: 30
idle_ttl_s: 120
healthcheck:
  type: http
  path: /healthz
  expected_status: 200
  timeout_s: 2
adapter_type: http_forward_json
adapter_config:
  container_port: 8000
  path: /invoke
  method: POST
  timeout_s: 30
  cancel_path: /cancel
  env:
    MOCK_INSTANCE_ID: gpu-alpha
    MOCK_DEFAULT_SLEEP_S: "0"
    MOCK_RESPONSE_PREFIX: "gpu-alpha:"
    MOCK_TAG_COLOR: red
cancel_strategy: http_request_cancel
eviction_priority: 10
