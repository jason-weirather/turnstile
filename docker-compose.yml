services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A worker.celery_app worker -Q gpu --concurrency=1 --loglevel=info

  flower:
    build: .
    env_file:
      - .env
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: celery -A worker.celery_app flower --port=5555

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
