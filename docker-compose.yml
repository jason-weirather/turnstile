services:
  api:
    build: .
    env_file:
      - .env
    environment:
      - TURNSTILE_RUNTIME_MODE=docker
      - TURNSTILE_DOCKER_NETWORK=turnstile
      - TURNSTILE_DOCKER_HOST=${DOCKER_HOST:-}
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - turnstile
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker-gpu:
    build: .
    env_file:
      - .env
    environment:
      - TURNSTILE_RUNTIME_MODE=docker
      - TURNSTILE_DOCKER_NETWORK=turnstile
      - TURNSTILE_DOCKER_HOST=${DOCKER_HOST:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - turnstile
    depends_on:
      - redis
    command: celery -A worker:celery_app worker -Q gpu --concurrency=1 --loglevel=info

  worker-cpu:
    build: .
    env_file:
      - .env
    environment:
      - TURNSTILE_RUNTIME_MODE=docker
      - TURNSTILE_DOCKER_NETWORK=turnstile
      - TURNSTILE_DOCKER_HOST=${DOCKER_HOST:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - turnstile
    depends_on:
      - redis
    command: celery -A worker:celery_app worker -Q cpu --concurrency=1 --loglevel=info

  flower:
    build: .
    env_file:
      - .env
    ports:
      - "5555:5555"
    networks:
      - turnstile
    depends_on:
      - redis
    command: celery -A worker:celery_app flower --port=5555

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - turnstile

networks:
  turnstile:
    name: turnstile
